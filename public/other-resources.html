<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The AI Playground | Other</title>
  <link rel="icon" href="assets/imgs/butterfly colored.png">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div class="page">
    <div class="topbar">
        <img src="assets/imgs/butterfly colored.png" alt="AI Playground Logo" class="logo">
        <h1 data-i18n="siteTitle">The AI Playground</h1>
        <div class="divider vertical">|</div>
        <div id="menu-home" data-i18n="menuOption1" class="menuoption">Home</div>
        <div id="menu-about" data-i18n="menuOption2" class="menuoption">About</div>
        <div id="menu-curious" data-i18n="menuOption3" class="menuoption active">For the curious</div>
        <div class="lang-toggle">
            <button id="lang-en" class="active">
                <img src="assets/imgs/flags/uk_color.png" alt="English">
            </button>
            <div class="divider">/</div>
            <button id="lang-da">
                <img src="assets/imgs/flags/dk_color.png" alt="Dansk">
            </button>
        </div>
    </div>
    <div class="focus">
      <p>Test</p>
    </div>
    
  </div>
  

  <script src="translations.js"></script>
  <script src="script.js"></script>
</body>
</html>
