<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The AI Playground | Room 1</title>
  <link rel="icon" href="./images/butterfly colored.png">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div class="page">
    <div class="header">
        <div class="header-left">
            <button id="return-btn" class="arrow-btn">
                <span class="arrow">&larr;</span>
            </button>
        </div>
        <h1 data-i18n="rulesTitle">Rule-based AI</h1>
        <div class="header-right"></div>
    </div>
    <div id="rules-popup" class="popup hidden">
        <div class="popup-content">
            <button id="close-rules-btn"><div>X</div></button>
            <h2>Rules</h2>
            <div id="rules-list"></div>
            <div id="rule-builder" class="rule-builder hidden">
                <h3 id="rule-builder-title">Make your own rule</h3>

                <label>
                    Name your label:
                    <input type="text" id="new-rule-name" maxlength="20" placeholder="e.g. Rocket">
                </label>

                <div id="rule-builder-blocks"></div>

                <div class="rule-builder-actions">
                    <button id="save-rule-btn">Save</button>
                    <button id="cancel-rule-btn" class="crit">Cancel</button>
                </div>
            </div>
            <button id="add-rule-btn"><div>+</div></button>
        </div>
    </div>
    <div id="rule-based-ai" class="focus">
        <div id="challenges" class="tallbox">
            <h2 data-i18n="challengesTitle">Challenges</h2>
            <ul class="challenge-list">
                <li>
                    <label>
                        <input type="checkbox" id="challenge-sun" disabled>
                        <div data-i18n="challengeSun">Draw a sun.</div>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox" id="challenge-house" disabled>
                        <div data-i18n="challengeHouse">Draw a house.</div>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox" id="challenge-fish" disabled>
                        <div data-i18n="challengeFish">Draw a fish.</div>
                    </label>
                </li>
            </ul>
            <div class="challenge-note" data-i18n="challengeNote">
                Challenges are complete when the AI recognizes the drawn image.
            </div>
        </div>
        <div class="draw-panel">
            <div class="button-row">
                <button id="reset-btn" class="crit">

        </div>
        <div id="result" class="tallbox">
            <div id="result-top">
                <h2 data-i18n="detectedTitle">Detected:</h2>
                <div class="result-body" id="result-detected">-</div>
            </div>
            <div id="result-bottom">
                <h2 data-i18n="whyTitle">Why:</h2>
                <div class="result-body" id="result-why">-</div>
            </div>
        </div>
    </div>
    
  </div>
  
  <script src="scripts/translations.js"></script>
  <script src="scripts/script.js"></script>
  <script src="scripts/rules.js"></script>
  <script src="scripts/rule-based-ai.js"></script>
</body>
</html>
