<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The AI Playground | Room 1</title>
  <link rel="icon" href="./images/butterfly colored.png">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div class="page">
    <div class="header">
        <div class="header-left">
            <button id="return-btn" class="arrow-btn">
                <span class="arrow">&larr;</span>
            </button>
        </div>
        <h1>Rule-based AI</h1>
        <div class="header-right"></div>
    </div>
    <div id="rule-based-ai" class="focus">
        <div id="challenges">
            <h2 data-i18n="challengesTitle">Challenges</h2>
            <ul class="challenge-list">
                <li>
                    <label>
                        <input type="checkbox" id="challenge-sun" disabled>
                        <div data-i18n="challengeSun">Draw a sun.</div>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox" id="challenge-house" disabled>
                        <div data-i18n="challengeHouse">Draw a house.</div>
                    </label>
                </li>
                <li>
                    <label>
                        <input type="checkbox" id="challenge-fish" disabled>
                        <div data-i18n="challengeFish">Draw a fish.</div>
                    </label>
                </li>
            </ul>
            <div class="challenge-note" data-i18n="challengeNote">
                Challenges are complete when the AI recognizes the drawn image.
            </div>
        </div>
        <div class="draw-panel">
            <div class="button-row">
                <button id="reset-btn">Reset</button>
                <button id="undo-btn">Undo</button>
            </div>
            <canvas id="draw"></canvas>
            <div class="button-row">
                <button id="classifyBtn" data-i18n="classifyBtn">Classify</button>
                <button id="settings">+</button>
            </div>
        </div>
        <div id="result"></div>
    </div>
    
  </div>
  
  <script src="scripts/translations.js"></script>
  <script src="scripts/script.js"></script>
  <script src="scripts/rule-based-ai.js"></script>
</body>
</html>
